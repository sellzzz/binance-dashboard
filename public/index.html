<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Market Data Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div>
          <h1>Position Monitor</h1>
          <p>Internal market data dashboard for monitoring position changes and liquidity context.</p>
        </div>
        <div class="actions">
          <a class="linkBtn" href="/smallcap.html">Small Cap Monitor</a>
          <button id="refreshBtn" type="button">刷新</button>
        </div>
      </section>

      <section class="controls" aria-label="筛选条件">
        <label>
          周期
          <select id="period">
            <option value="5m">5m</option>
            <option value="15m">15m</option>
            <option value="30m">30m</option>
            <option value="1h">1h</option>
            <option value="4h" selected>4h</option>
            <option value="1d">1d</option>
          </select>
        </label>
        <label>
          对比K线数
          <input id="points" type="number" min="2" max="30" value="5" />
        </label>
        <label>
          Change Threshold %
          <input id="threshold" type="number" min="0" max="500" value="30" />
        </label>
        <label>
          Scan Limit
          <input id="maxSymbols" type="number" min="20" max="500" value="260" />
        </label>
      </section>

      <section class="controls extension" aria-label="池市值比例筛选">
        <label>
          Liquidity/MCap Min %
          <input id="liqMin" type="number" min="0" max="100" step="0.1" placeholder="0.5" />
        </label>
        <label>
          Liquidity/MCap Max %
          <input id="liqMax" type="number" min="0" max="100" step="0.1" placeholder="1" />
        </label>
        <button id="liquidityScanBtn" type="button">Filter Liquidity</button>
        <button id="clearLiquidityBtn" type="button" class="secondary">Clear</button>
      </section>

      <section class="stats" aria-label="扫描结果概要">
        <div>
          <span>Signals</span>
          <strong id="alertCount">-</strong>
        </div>
        <div>
          <span>Scanned</span>
          <strong id="scanned">-</strong>
        </div>
        <div>
          <span>Updated</span>
          <strong id="updated">-</strong>
        </div>
      </section>

      <section class="panel">
        <div class="panelHead">
          <h2>Position Change Signals</h2>
          <span id="status">等待扫描</span>
        </div>
        <div class="tableWrap">
          <table>
            <thead id="alertsHead"></thead>
            <tbody id="alertsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="panelHead">
          <h2>Position Change Top 30</h2>
        </div>
        <div class="tableWrap">
          <table>
            <thead id="topHead"></thead>
            <tbody id="topBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <dialog id="liquidityDialog">
      <div class="dialogHead">
        <div>
          <h2 id="liqTitle">Liquidity Range</h2>
          <p id="liqMeta"></p>
        </div>
        <button id="closeDialog" type="button" class="secondary">Close</button>
      </div>
      <div id="liqChart" class="liqChart"></div>
      <div id="liqStatus" class="liqStatus"></div>
    </dialog>
    <script src="/app.js" type="module"></script>
  </body>
</html>
