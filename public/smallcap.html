<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Small Cap Monitor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div>
          <h1>Small Cap Monitor</h1>
          <p>Focused market data view for smaller names, position changes, rates, and liquidity context.</p>
        </div>
        <div class="actions">
          <a class="linkBtn" href="/">Main Dashboard</a>
          <button id="refreshBtn" type="button">刷新</button>
        </div>
      </section>

      <section class="controls" aria-label="Small cap filters">
        <label>
          周期
          <select id="period">
            <option value="15m">15m</option>
            <option value="1h">1h</option>
            <option value="4h" selected>4h</option>
            <option value="1d">1d</option>
          </select>
        </label>
        <label>
          对比K线数
          <input id="points" type="number" min="2" max="30" value="5" />
        </label>
        <label>
          Market Cap Max $M
          <input id="smallCapMaxM" type="number" min="1" max="5000" value="100" />
        </label>
        <label>
          Min Change %
          <input id="smallCapMinChange" type="number" min="-100" max="500" value="0" />
        </label>
        <label>
          Scan Limit
          <input id="maxSymbols" type="number" min="20" max="500" value="500" />
        </label>
        <label>
          Symbol Search
          <input id="symbolSearch" type="search" placeholder="KOMA" />
        </label>
      </section>

      <section class="stats" aria-label="扫描结果概要">
        <div>
          <span>Small Cap Count</span>
          <strong id="smallCount">-</strong>
        </div>
        <div>
          <span>Scanned</span>
          <strong id="scanned">-</strong>
        </div>
        <div>
          <span>Updated</span>
          <strong id="updated">-</strong>
        </div>
      </section>

      <section class="panel focusPanel">
        <div class="panelHead">
          <div>
            <h2>Small Cap List</h2>
            <p id="status">等待扫描</p>
          </div>
        </div>
        <div class="tableWrap">
          <table>
            <thead id="smallHead"></thead>
            <tbody id="smallBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <dialog id="liquidityDialog">
      <div class="dialogHead">
        <div>
          <h2 id="liqTitle">Liquidity Range</h2>
          <p id="liqMeta"></p>
        </div>
        <button id="closeDialog" type="button" class="secondary">Close</button>
      </div>
      <div id="liqChart" class="liqChart"></div>
      <div id="liqStatus" class="liqStatus"></div>
    </dialog>
    <script src="/smallcap.js" type="module"></script>
  </body>
</html>
