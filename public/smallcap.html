<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小市值合约雷达</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div>
          <h1>小市值合约雷达</h1>
          <p>独立关注低市值 USDT-M 合约的持仓变化、资金费、BSC 池子和 Pancake V3 区间。</p>
        </div>
        <div class="actions">
          <a class="linkBtn" href="/">返回总看板</a>
          <button id="refreshBtn" type="button">刷新</button>
        </div>
      </section>

      <section class="controls" aria-label="小市值筛选条件">
        <label>
          周期
          <select id="period">
            <option value="15m">15m</option>
            <option value="1h">1h</option>
            <option value="4h" selected>4h</option>
            <option value="1d">1d</option>
          </select>
        </label>
        <label>
          对比K线数
          <input id="points" type="number" min="2" max="30" value="5" />
        </label>
        <label>
          市值上限 $M
          <input id="smallCapMaxM" type="number" min="1" max="5000" value="100" />
        </label>
        <label>
          最小增仓 %
          <input id="smallCapMinChange" type="number" min="-100" max="500" value="0" />
        </label>
        <label>
          扫描数量
          <input id="maxSymbols" type="number" min="20" max="500" value="500" />
        </label>
        <label>
          合约搜索
          <input id="symbolSearch" type="search" placeholder="KOMA" />
        </label>
      </section>

      <section class="stats" aria-label="扫描结果概要">
        <div>
          <span>小市值数量</span>
          <strong id="smallCount">-</strong>
        </div>
        <div>
          <span>已扫描</span>
          <strong id="scanned">-</strong>
        </div>
        <div>
          <span>更新时间</span>
          <strong id="updated">-</strong>
        </div>
      </section>

      <section class="panel focusPanel">
        <div class="panelHead">
          <div>
            <h2>小市值合约列表</h2>
            <p id="status">等待扫描</p>
          </div>
        </div>
        <div class="tableWrap">
          <table>
            <thead id="smallHead"></thead>
            <tbody id="smallBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <dialog id="liquidityDialog">
      <div class="dialogHead">
        <div>
          <h2 id="liqTitle">Pancake 流动性区间</h2>
          <p id="liqMeta"></p>
        </div>
        <button id="closeDialog" type="button" class="secondary">关闭</button>
      </div>
      <div id="liqChart" class="liqChart"></div>
      <div id="liqStatus" class="liqStatus"></div>
    </dialog>
    <script src="/smallcap.js" type="module"></script>
  </body>
</html>
